[tools]
# 3.11.4's python-build-standalone build (2023) ships no GitHub artifact
# attestations, so Railway's builder fails verifying it. 2024+ builds carry
# attestations, so pinning a newer patch makes `mise install` pass.
python = "3.11.13"

[settings]
# Fallback in case an attestation-less build is ever pinned again. Note:
# Railway's Railpack builder may ignore project [settings], so this is not
# a substitute for using an attested python build above.
python.github_attestations = false
