{% extends 'base.html' %}
{% load static %}

{% block title %}Нэвтрэх — Чацаргана{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/order.css' %}" />{% endblock %}

{% block content %}
<div class="order-page" style="display:flex;align-items:center;justify-content:center;min-height:75vh;">
  <div style="width:100%;max-width:380px;padding:0 20px;">
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 36px;">

      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:1.5rem;font-weight:800;color:#7ec850">Чацар<span style="color:#fdf6e3">гана</span></div>
        <div style="font-size:.8rem;color:rgba(253,246,227,.45);margin-top:4px">Нэвтрэх</div>
      </div>

      {% if error %}
        <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:10px;padding:10px 14px;font-size:.85rem;text-align:center;margin-bottom:16px;">
          {{ error }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Нэвтрэх нэр</label>
          <input type="text" name="username" class="form-control" autofocus autocomplete="username" placeholder="username" />
        </div>
        <div class="form-group">
          <label>Нууц үг</label>
          <input type="password" name="password" class="form-control" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-order" style="margin-top:8px">Нэвтрэх →</button>
      </form>

      <div style="text-align:center;margin-top:20px;font-size:.85rem;color:rgba(253,246,227,.45);">
        Бүртгэлгүй юу?
        <a href="{% url 'core:register' %}" style="color:#7ec850;text-decoration:none">Бүртгүүлэх</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
