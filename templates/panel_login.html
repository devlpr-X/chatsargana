{% load static %}<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нэвтрэх — Чацаргана Панел</title>
  <link rel="stylesheet" href="{% static 'css/panel.css' %}" />
</head>
<body class="panel-body">

<div class="panel-login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">Чацар<span>гана</span></div>
      <div class="login-logo-sub">Удирдлагын самбар</div>
    </div>

    <div class="login-title">Нэвтрэх</div>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="login-field">
        <label>Нэвтрэх нэр</label>
        <input type="text" name="username" class="login-input" autofocus autocomplete="username" placeholder="admin" />
      </div>
      <div class="login-field">
        <label>Нууц үг</label>
        <input type="password" name="password" class="login-input" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="login-btn">Нэвтрэх →</button>
    </form>

    <div class="login-back">
      <a href="{% url 'core:index' %}">← Сайт руу буцах</a>
      &nbsp;·&nbsp;
      <a href="/admin/">Django admin</a>
    </div>
  </div>
</div>

</body>
</html>
